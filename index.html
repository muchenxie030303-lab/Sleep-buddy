<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sleep Buddy" />
  <title>Sleep Buddy</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header>
      <p class="eyebrow">Daily rhythm</p>
      <h1>Sleep Buddy</h1>
      <p class="tagline">Wake &amp; rest, on your schedule</p>
    </header>

    <section class="card card--wake" aria-labelledby="wake-heading">
      <div class="card-inner">
        <div class="card-label">
          <span class="label-icon" aria-hidden="true">☀️</span>
          <h2 id="wake-heading">Wake up</h2>
        </div>

        <label class="setting-row">
          <span class="setting-label">Time</span>
          <span class="setting-control time-control">
            <input type="time" id="wakeTime" class="time-input-native" value="07:00" />
            <span class="time-display" id="wakeTimeDisplay">7:00 AM</span>
          </span>
        </label>

        <label class="setting-row setting-row--divider">
          <span class="setting-label">Alarm sound</span>
          <select id="wakeSound" class="setting-control sound-select"></select>
        </label>
      </div>
    </section>

    <section class="card card--sleep" aria-labelledby="sleep-heading">
      <div class="card-inner">
        <div class="card-label">
          <span class="label-icon" aria-hidden="true">🌙</span>
          <h2 id="sleep-heading">Sleep</h2>
        </div>

        <label class="setting-row">
          <span class="setting-label">Time</span>
          <span class="setting-control time-control">
            <input type="time" id="sleepTime" class="time-input-native" value="23:00" />
            <span class="time-display" id="sleepTimeDisplay">11:00 PM</span>
          </span>
        </label>

        <label class="setting-row setting-row--divider">
          <span class="setting-label">Reminder sound</span>
          <select id="sleepSound" class="setting-control sound-select"></select>
        </label>
      </div>
    </section>

    <section class="card controls">
      <label class="toggle">
        <input type="checkbox" id="enabled" checked />
        <span class="toggle-track"></span>
        <span>Reminders on</span>
      </label>

      <div class="button-row">
        <button type="button" id="testWake" class="btn secondary">Test wake alarm</button>
        <button type="button" id="testSleep" class="btn secondary">Test sleep sound</button>
      </div>

      <button type="button" id="save" class="btn primary">Save reminders</button>
    </section>

    <p id="notifStatus" class="notif-status"></p>
    <p id="status" class="status" role="status" aria-live="polite"></p>

    <div id="sleepAlert" class="sleep-alert" hidden>
      <p class="sleep-alert-title" id="sleepAlertTitle"></p>
      <p class="sleep-alert-body" id="sleepAlertBody"></p>
      <button type="button" id="dismissSleepAlert" class="btn secondary">OK</button>
    </div>

    <div id="wakeAlarmOverlay" class="wake-alarm-overlay" hidden>
      <div class="wake-alarm-glow" aria-hidden="true"></div>
      <div class="wake-alarm-content">
        <p class="wake-alarm-icon" aria-hidden="true">☀️</p>
        <h2 class="wake-alarm-title">Good morning</h2>
        <p class="wake-alarm-body">Time to wake up — alarm repeats until you dismiss it.</p>
        <button type="button" id="dismissWakeAlarm" class="btn primary btn-awake">I'm awake</button>
      </div>
    </div>

    <footer>
      <p>Add to your iPhone Home Screen for the best experience.</p>
      <p class="hint">Safari → Share → <strong>Add to Home Screen</strong></p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
